spring:
  cloud:
    config:
      import-check:
        enabled: false
  data:
    redis:
      client-name:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 5s
  jpa:
    show-sql: true
    properties:
      hibernate:
        use_sql_comments: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 20000 # 连接超时时间ms
