services:
  nb:
    #    image: ghcr.io/graalvm/native-image:ol8-java17-22.3.2
    image: container-registry.oracle.com/graalvm/native-image:21
    volumes:
      - ./:/workspace
      - /workspace/.git
      - ~/.m2:/root/.m2
    working_dir: /workspace/eureka-server
    environment:
      - LANG=C.UTF-8                 # 添加 locale 设置
      - LC_ALL=C.UTF-8
      - MAVEN_OPTS=-Xmx4g            # 可选：设置 Maven 内存
    entrypoint: [ "/bin/bash" ]
    stdin_open: true
    tty: true
    command: ../mvnw -Pnative native:compile -DskipTests
#    command: "chmod +x ../mvnw && ../mvnw -Pnative native:compile -DskipTests"
#      sh -c "
#        gu install native-image &&
#        ./mvnw -Pnative native:compile -DskipTests
#      "